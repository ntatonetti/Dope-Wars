<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Dope Wars</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #33ff33;
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
      min-height: 100vh;
      min-height: 100dvh;
    }
    #app { padding: 8px; }
  </style>
</head>
<body>
  <div id="app">Dope Wars loading...</div>
  <script>
    // --- Constants ---
    const LOCATIONS = ['Bronx', 'Ghetto', 'Central Park', 'Manhattan', 'Coney Island', 'Brooklyn'];

    const GOODS = {
      Cocaine: [15000, 30000],
      Heroin:  [5000, 14000],
      Acid:    [1000, 4500],
      Weed:    [300, 900],
      Speed:   [70, 250],
      Ludes:   [10, 60],
    };

    const GOOD_NAMES = Object.keys(GOODS);

    // --- State ---
    function createState() {
      const inventory = {};
      for (const g of GOOD_NAMES) inventory[g] = 0;
      return {
        cash: 2000,
        debt: 5500,
        bank: 0,
        inventory,
        capacity: 100,
        currentLocation: LOCATIONS[Math.floor(Math.random() * LOCATIONS.length)],
        day: 1,
        guns: 0,
        health: 100,
      };
    }

    function generatePrices() {
      const prices = {};
      for (const [good, [lo, hi]] of Object.entries(GOODS)) {
        prices[good] = lo + Math.floor(Math.random() * (hi - lo + 1));
      }
      return prices;
    }

    // --- Service Worker ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // --- Boot ---
    let state = createState();
    let prices = generatePrices();
    document.getElementById('app').textContent = `Cash: $${state.cash} | Location: ${state.currentLocation}`;
  </script>
</body>
</html>
